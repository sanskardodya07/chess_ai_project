<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PACE — Portable Application Chess Engine</title>
  <meta name="description" content="PACE is a Procedural-AI based Chess Engine. Play chess against an AI opponent, anywhere.">

  <!-- Theme -->
  <meta name="theme-color" content="#111111">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PACE">
  <link rel="apple-touch-icon" href="icons/Icon-maskable-512.png">

  <!-- Open Graph -->
  <meta property="og:title"       content="PACE — Portable Application Chess Engine">
  <meta property="og:description" content="Play chess against a Procedural-AI engine, anywhere.">
  <meta property="og:image"       content="icons/Icon-512.png">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary">

  <!-- No white flash on load -->
  <style>
    html, body { background-color: #1A1A1A; margin: 0; padding: 0; height: 100%; }
  </style>
</head>
<body>
  <div id="loading-screen" style="
    position: fixed; inset: 0;
    background: #1A1A1A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  ">
    <img src="icons/Icon-192.png" width="80" height="80"
         style="border-radius: 20px; opacity: 0.9;">
    <div style="color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 2px;">
      PACE
    </div>
    <div style="
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4A90D9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    "></div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const s = document.getElementById('loading-screen');
      if (s) {
        s.style.transition = 'opacity 0.4s ease';
        s.style.opacity = '0';
        setTimeout(() => s.remove(), 400);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      setTimeout(() => {
        const b = document.getElementById('pwa-banner');
        if (b) {
          b.style.transform = 'translateX(-50%) translateY(0)';
          b.style.opacity   = '1';
        }
      }, 3000);
    });

    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then((choice) => {
        if (choice.outcome === 'accepted') dismissBanner();
        deferredPrompt = null;
      });
    }

    function dismissBanner() {
      const b = document.getElementById('pwa-banner');
      if (!b) return;
      b.style.transform = 'translateX(-50%) translateY(120%)';
      b.style.opacity   = '0';
      localStorage.setItem('pwa-dismissed', Date.now());
    }

    window.addEventListener('load', () => {
      const dismissed = localStorage.getItem('pwa-dismissed');
      if (dismissed && Date.now() - Number(dismissed) < 7 * 24 * 60 * 60 * 1000) {
        const b = document.getElementById('pwa-banner');
        if (b) b.remove();
      }
    });
  </script>

  <div id="pwa-banner" style="
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    z-index: 9999;
    width: min(92vw, 380px);
    background: #1E1E1E;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 18px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  ">
    <div style="display:flex; align-items:center; gap:14px;">
      <img src="icons/Icon-192.png" width="48" height="48"
           style="border-radius:12px; flex-shrink:0;" alt="PACE icon">
      <div>
        <div style="color:#fff; font-size:15px; font-weight:600; margin-bottom:3px;">
          Install PACE
        </div>
        <div style="color:rgba(255,255,255,0.5); font-size:13px; line-height:1.4;">
          Add to your home screen for the full experience
        </div>
      </div>
    </div>
    <div style="display:flex; gap:10px;">
      <button onclick="dismissBanner()" style="
        flex: 1;
        padding: 11px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 11px;
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      ">Not now</button>
      <button onclick="installPWA()" style="
        flex: 2;
        padding: 11px;
        background: #4A90D9;
        border: none;
        border-radius: 11px;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      ">Install App</button>
    </div>
  </div>

</body>
</html>
